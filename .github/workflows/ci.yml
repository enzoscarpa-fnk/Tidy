name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Typecheck + Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tidy
          POSTGRES_PASSWORD: tidy_dev_password
          POSTGRES_DB: tidy_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tidy -d tidy_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://tidy:tidy_dev_password@localhost:5432/tidy_db
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @tidy/backend exec prisma generate

      - name: Typecheck
        run: pnpm --filter @tidy/backend typecheck

      - name: Run tests
        run: pnpm --filter @tidy/backend test
