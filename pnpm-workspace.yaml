packages:
  - 'backend'
  - 'mobile'
allowBuilds:
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@sentry/capacitor': false
  bcrypt: true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
  vue-demi: true
minimumReleaseAgeExclude:
  - '@sentry-internal/browser-utils@10.55.0'
  - '@sentry-internal/feedback@10.55.0'
  - '@sentry-internal/replay-canvas@10.55.0'
  - '@sentry-internal/replay@10.55.0'
  - '@sentry/browser@10.55.0'
  - '@sentry/core@10.55.0'
  - '@sentry/vue@10.55.0'
